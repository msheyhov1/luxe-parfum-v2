<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&family=Prata&display=swap" rel="stylesheet">
</helmet>
<div onMouseEnter="{{ onEnter }}" onMouseLeave="{{ onLeave }}" onClick="{{ onOpen }}" style="--gold:#c9a24b;--gold2:#9c7836;--line:rgba(51,51,51,.13);--line2:rgba(51,51,51,.22);--text:#2b2620;--t2:#6b675e;--t3:#9a968a;--ease:cubic-bezier(.22,.61,.36,1);display:flex;flex-direction:column;cursor:pointer;font-family:Manrope,sans-serif;background:transparent">
  <div style="position:relative;aspect-ratio:4/5;overflow:hidden;background:#f1efe4">
    <div style="position:absolute;inset:0;transition:transform .9s var(--ease);transform: {{ imgTransform }};background: {{ imgBg }}"></div>
    <div style="position:absolute;inset:0;background:repeating-linear-gradient(90deg,rgba(51,51,51,.03) 0 1px,transparent 1px 9px)"></div>
    <div style="position:absolute;inset:14px;border:1px solid var(--line);pointer-events:none"></div>
    <sc-if value="{{ badge }}" hint-placeholder-val="">
      <div style="position:absolute;top:16px;left:16px;padding:6px 12px;background:rgba(255,254,242,.72);backdrop-filter:blur(5px);border:1px solid rgba(201,162,75,.55);color:var(--gold2);font-size:9px;letter-spacing:.24em;text-transform:uppercase;font-weight:500">{{ badge }}</div>
    </sc-if>
    <div style="position:absolute;left:18px;bottom:16px;font-family:ui-monospace,Menlo,monospace;font-size:9px;letter-spacing:.16em;color:var(--t3);text-transform:uppercase">{{ capt }}</div>
  </div>
  <div style="padding:16px 2px 0;display:flex;flex-direction:column;gap:5px">
    <div style="font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--t2)">{{ brand }}</div>
    <div style="font-family:Prata,serif;font-size:19px;color:var(--text);line-height:1.16">{{ name }}</div>
    <div style="display:flex;align-items:center;gap:7px;font-size:10.5px;letter-spacing:.03em;color:var(--t3);margin-top:1px"><span>{{ category }}</span><span style="opacity:.5">·</span><span>{{ volume }}</span></div>
    <div style="display:flex;align-items:center;gap:6px;margin-top:2px"><span style="color:var(--gold);font-size:11px;letter-spacing:1.5px">{{ ratingStars }}</span><span style="font-size:11px;color:var(--text)">{{ rating }}</span><span style="font-size:10.5px;color:var(--t3)">· {{ reviewCount }}</span></div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-top:12px;gap:8px">
      <div style="font-family:Prata,serif;font-size:18px;color:var(--text);letter-spacing:.01em">{{ priceFmt }}</div>
      <div style="display:flex;align-items:center;gap:8px">
        <button onClick="{{ onWish }}" aria-label="В избранное" style="width:42px;height:42px;flex:0 0 42px;display:grid;place-items:center;border:1px solid var(--line2);background:transparent;cursor:pointer;transition:all .3s var(--ease)" style-hover="border-color:var(--gold)"><span style="font-size:16px;line-height:1;color: {{ heartColor }}">{{ heart }}</span></button>
        <sc-if value="{{ notInCart }}" hint-placeholder-val="{{ true }}"><button onClick="{{ onAdd }}" aria-label="В корзину" style="width:42px;height:42px;display:grid;place-items:center;border:1px solid var(--line2);background:transparent;color:var(--text);cursor:pointer;transition:all .3s var(--ease)" style-hover="background:var(--gold);color:#2b2620;border-color:var(--gold)"><span style="font-size:17px;line-height:1">{{ addGlyph }}</span></button></sc-if>
        <sc-if value="{{ inCart }}" hint-placeholder-val=""><div style="display:flex;align-items:center;border:1px solid var(--gold);background:rgba(201,162,75,.08)"><button onClick="{{ onDec }}" aria-label="Убрать одну" style="width:36px;height:42px;display:grid;place-items:center;background:none;border:none;color:var(--text);font-size:18px;line-height:1;cursor:pointer">−</button><span style="min-width:22px;text-align:center;font-size:14px;color:var(--gold2);font-weight:600">{{ qtyInCart }}</span><button onClick="{{ onInc }}" aria-label="Добавить одну" style="width:36px;height:42px;display:grid;place-items:center;background:none;border:none;color:var(--text);font-size:17px;line-height:1;cursor:pointer">+</button></div></sc-if>
      </div>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:320,&quot;height&quot;:480},&quot;card&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;any&quot;}}">
class Component extends DCLogic {
  state = { hover: false };
  renderVals() {
    const c = this.props.card || {};
    return Object.assign({}, c, {
      heart: c.wished ? '♥' : '♡',
      heartColor: c.wished ? '#e3c178' : '#b6b2a6',
      addGlyph: c.justAdded ? '✓' : '+',
      overlayOpacity: this.state.hover ? '1' : '0',
      imgTransform: this.state.hover ? 'scale(1.05)' : 'scale(1)',
      onEnter: () => this.setState({ hover: true }),
      onLeave: () => this.setState({ hover: false }),
    });
  }
}
</script>
</body>
</html>
